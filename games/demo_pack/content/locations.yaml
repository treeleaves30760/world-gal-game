regions:
  - id: town
    name: "小鎮"
    color: [180, 140, 110]

locations:

  - id: starting_room
    name: "出租房間"
    region: town
    description: |
      你剛搬進來的小房間。窗外是廣場。
    background: assets/backgrounds/starting_room.png
    backgrounds:
      morning: assets/backgrounds/starting_room_morning.png
      night: assets/backgrounds/starting_room_night.png
    map_x: 10
    map_y: 50
    exits:
      - target: town_square
        travel_cost: 1
    scene_hooks:
      - scene_id: prologue
        trigger: auto
        forbids_flags: [prologue_done]
        once: true

  - id: town_square
    name: "鎮中廣場"
    region: town
    description: |
      佈告欄、長椅、人潮。下午的時候特別熱鬧。
    background: assets/backgrounds/town_square.png
    map_x: 30
    map_y: 50
    exits:
      - target: starting_room
      - target: park
      - target: shop_alley
    npcs:
      - npc_id: heroine_1
        times: [afternoon, evening]
    scene_hooks:
      - scene_id: meet_heroine
        trigger: auto
        requires_flags: [prologue_done]
        forbids_flags: [met_heroine_1]
        once: true
      - scene_id: find_sketchbook_square
        trigger: examine
        requires_flags: [quest_started]
        forbids_flags: [obj_square_done]

  - id: park
    name: "湖畔公園"
    region: town
    description: |
      安靜的小公園。湖邊偶爾有人在練習素描。
    background: assets/backgrounds/park.png
    map_x: 50
    map_y: 45
    exits:
      - target: town_square
    scene_hooks:
      - scene_id: find_sketchbook_park
        trigger: examine
        requires_flags: [quest_started]
        forbids_flags: [obj_park_done]

  - id: shop_alley
    name: "雜貨鋪小巷"
    region: town
    description: |
      巷底有一間老雜貨鋪，老闆通常都在。
    background: assets/backgrounds/shop_alley.png
    map_x: 35
    map_y: 70
    exits:
      - target: town_square
    npcs:
      - npc_id: shopkeeper_uncle
        times: [morning, noon, afternoon, evening]
    scene_hooks:
      - scene_id: find_sketchbook_alley
        trigger: examine
        requires_flags: [quest_started]
        forbids_flags: [obj_alley_done]
