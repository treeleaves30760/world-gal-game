# Pack metadata for demo_pack.
#
# This is the engine's built-in showcase. A 5-10 minute playable demo
# that exercises most subsystems (dialogue, quest, shop, inventory,
# affection, achievements, multi-time backgrounds). All assets are
# .gitkeep stubs — the engine renders purple placeholders for missing
# images, so the demo runs even with no art.
title: "小鎮的午後"
subtitle: "Demo Pack — Engine Showcase"

text_speed: 45

# Optional bundled font — relative to this pack's root.
# bundled_font: assets/fonts/MyFont.ttf

title_bg: assets/backgrounds/title.png

start_location: starting_room
intro_scene: prologue

player:
  name: "玩家"
  pronouns: "他"

starting_inventory:
  pocket_notebook: 1

