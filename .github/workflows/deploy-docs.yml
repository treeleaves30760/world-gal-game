# Deploy the Docusaurus documentation site to GitHub Pages.
#
# The docs CONTENT lives in docs/ (the single source of truth). The Docusaurus
# config (package.json / docusaurus.config.js / sidebars.js / src / static)
# lives at the repo root — there is no separate website/ folder. Build output
# goes to site/ (build/ is reserved for PyInstaller).
#
# ONE-TIME SETUP (repo owner, once): GitHub → Settings → Pages → "Build and
# deployment" → Source → select "GitHub Actions". After that, every push to main
# touching docs/ or the Docusaurus config republishes the site at
# https://treeleaves30760.github.io/world-gal-game/

name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - 'docusaurus.config.js'
      - 'sidebars.js'
      - 'src/**'
      - 'static/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Permissions needed for the GitHub Pages deployment via Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

# Run the JS-based actions (checkout / setup-node / configure-pages /
# upload-artifact / deploy-pages) on the Node.js 24 runtime — Node.js 20 is
# deprecated on GitHub runners (forced off by 2026-09). This opts in now.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
